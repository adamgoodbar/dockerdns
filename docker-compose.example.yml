services:
  dockerdns:
    build: .
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DNS_SERVER: ns1.example.com:53
      DNS_ZONE: example.com.
      DNS_TSIG_KEY: mykey.
      DNS_TSIG_SECRET: <base64-encoded-secret>
      LABEL: dns.hostname
      TTL: 60

  # Example workload — will be registered as myapp.example.com
  myapp:
    image: nginx
    labels:
      dns.hostname: myapp.example.com
